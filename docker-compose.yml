name: orderflow

x-app-env: &app-env
  POSTGRES_DSN: postgresql+asyncpg://orderflow:orderflow@postgres:5432/orderflow
  REDIS_URL: redis://redis:6379/0
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  LOG_LEVEL: INFO

services:
  # --- infrastructure -----------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orderflow
      POSTGRES_PASSWORD: orderflow
      POSTGRES_DB: orderflow
    ports:
      - "5433:5432"          # 5433 on the host to avoid clashing with a local PG
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderflow -d orderflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # appendonly keeps the idempotency guards across a restart; without it a
    # restart mid-flight could let an already-processed event through again.
    command: ["redis-server", "--appendonly", "yes", "--save", ""]
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    # KRaft mode: broker + controller in one node, no ZooKeeper.
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Topics are part of the contract — declared in app/kafka/admin.py, not
      # conjured by whoever produces first.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: orderflow-kraft-cluster
    ports:
      - "29092:29092"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  # --- application --------------------------------------------------------
  api:
    build: .
    environment: *app-env
    ports:
      - "8000:8000"
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      kafka: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "-m", "app.worker"]
    environment: *app-env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      kafka: {condition: service_healthy}
    # Scale freely: `docker compose up -d --scale worker=3`.
    # 3 partitions means up to 3 useful replicas in the processor group.
    restart: unless-stopped

  # --- optional UI: `docker compose --profile tools up -d` ----------------
  kafka-ui:
    image: kafbat/kafka-ui:latest
    profiles: ["tools"]
    environment:
      KAFKA_CLUSTERS_0_NAME: orderflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "8090:8080"
    depends_on:
      kafka: {condition: service_healthy}

volumes:
  pgdata:
  redisdata:
  kafkadata:
